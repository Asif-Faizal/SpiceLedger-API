info:
  name: Today by Grade
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/daily-prices/grade/today/?grade_id={{gradeId}}"
  params:
    - name: grade_id
      value: "{{gradeId}}"
      type: query
  auth:
    type: basic
    username: "{{basicAuthUser}}"
    password: "{{basicAuthPass}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
