info:
  name: List Daily Prices
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/daily-prices/?grade_id={{gradeId}}&duration=7&date=2026-06-16"
  params:
    - name: grade_id
      value: "{{gradeId}}"
      type: query
    - name: duration
      value: "7"
      type: query
    - name: date
      value: 2026-06-16
      type: query
  auth:
    type: basic
    username: "{{basicAuthUser}}"
    password: "{{basicAuthPass}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
