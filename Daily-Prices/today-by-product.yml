info:
  name: Today by Product
  type: http
  seq: 4

http:
  method: GET
  url: "{{baseUrl}}/daily-prices/product/today/?product_id={{productId}}"
  params:
    - name: product_id
      value: "{{productId}}"
      type: query
  auth:
    type: basic
    username: "{{basicAuthUser}}"
    password: "{{basicAuthPass}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
