info:
  name: Logout
  type: http
  seq: 4

http:
  method: POST
  url: "{{baseUrl}}/accounts/logout"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "device_id": "{{deviceId}}"
      }
  auth:
    type: bearer
    token: "{{merchantAccessToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
