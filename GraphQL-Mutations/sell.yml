info:
  name: Sell
  type: graphql
  seq: 5

graphql:
  method: POST
  url: "{{graphqlUrl}}"
  body:
    query: |
      mutation Sell($spiceGradeId: ID!, $quantity: Float!, $price: Float!, $tradeDate: String) {
        sell(spiceGradeId: $spiceGradeId, quantity: $quantity, price: $price, tradeDate: $tradeDate) {
          id
          userId
          spiceGradeId
          type
          quantity
          price
          tradeDate
          createdAt
        }
      }
    variables: |
      {
        "spiceGradeId": "{{gradeId}}",
        "quantity": 1.0,
        "price": 130.0,
        "tradeDate": "2026-06-14"
      }
  auth:
    type: bearer
    token: "{{merchantAccessToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Execute a sell trade. Run Login Merchant first.
