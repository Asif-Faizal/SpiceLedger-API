info:
  name: Create Account
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/accounts"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "id": "",
        "name": "New Merchant",
        "user_type": "merchant",
        "email": "newmerchant@example.com",
        "password": "secret123"
      }
  auth:
    type: basic
    username: "{{basicAuthUser}}"
    password: "{{basicAuthPass}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
