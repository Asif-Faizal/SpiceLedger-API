info:
  name: Check Email
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/accounts/check-email?email=test@gmail.com"
  params:
    - name: email
      value: test@gmail.com
      type: query
  auth:
    type: basic
    username: "{{basicAuthUser}}"
    password: "{{basicAuthPass}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
